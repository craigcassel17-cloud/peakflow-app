<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PeakFlow CRM</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
.header {background:#111; color:#fff; padding:15px;}
.container {padding:15px;}
.card {background:#fff; padding:15px; margin-bottom:15px; border-radius:10px;}
input, button {width:100%; padding:10px; margin-top:5px;}
button {background:#111; color:#fff; border:none;}
</style>
</head><body><div class="header">
<h2>PeakFlow CRM</h2>
</div><div class="container"><div class="card">
<h3>Add Customer</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="service" placeholder="Service">
<input id="price" placeholder="Price">
<button onclick="add()">Save</button>
</div><div class="card">
<h3>Customers</h3>
<div id="list"></div>
</div></div><script>
let data = JSON.parse(localStorage.getItem("crm") || "[]");

function add(){
let customer = {
   name: document.getElementById("name").value,
   phone: document.getElementById("phone").value,
   service: document.getElementById("service").value,
   price: document.getElementById("price").value
};
data.push(customer);
localStorage.setItem("crm", JSON.stringify(data));
render();
}

function render(){
let html = "";
data.forEach((c,i)=>{
   html += "<div style='border-bottom:1px solid #ccc;padding:10px'>";
   html += "<b>"+c.name+"</b><br>";
   html += c.phone+"<br>";
   html += c.service+"<br>";
   html += "$"+c.price+"<br>";
   html += "</div>";
});
document.getElementById("list").innerHTML = html;
}

render();
</script></body>
</html>
